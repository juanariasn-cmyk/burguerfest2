<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burguer Fest 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div class="main-wrapper">
        <div class="glow-spot"></div>
        
        <div class="container">
            <header class="hero-header">
                <div class="logo-container">
                    <img src="Logo.png" alt="Burguer Fest" class="main-logo-img">
                </div>
                <div class="status-bar">
                    <span class="live-dot"></span> EN VIVO: SELECCIÓN 2026
                </div>
            </header>

            <section class="glass-card">
                <div class="rest-context">
                    <img id="rest-logo" src="" alt="Restaurante" class="mini-avatar">
                    <div class="name-box">
                        <span class="voter-label">ESTÁS CALIFICANDO A:</span>
                        <h2 id="rest-name">Cargando...</h2>
                    </div>
                </div>

                <div id="login-section" class="content-block">
                    <div class="welcome-text">
                        <h3>¡Hola, Foodie!</h3>
                        <p>Tu opinión define quién se lleva la corona este año.</p>
                    </div>

                    <div class="input-wrapper">
                        <div class="input-field">
                            <input type="tel" id="phone" required placeholder=" ">
                            <label>WhatsApp / Celular</label>
                            <span class="focus-border"></span>
                        </div>
                        <div class="input-field">
                            <input type="text" id="code" required maxlength="6" placeholder=" ">
                            <label>Código del Ticket</label>
                            <span class="focus-border"></span>
                        </div>
                    </div>

                    <button onclick="validarIngreso()" class="btn-shine">
                        <span>ACCEDER AL JURADO</span>
                    </button>
                </div>

                <div id="vote-section" class="content-block" style="display: none;">
                    <div class="image-frame">
                        <img id="burger-img" src="" alt="Hamburguesa" class="hero-burger">
                        <div class="img-overlay"></div>
                    </div>

                    <div class="rating-engine">
                        <p class="rating-hint">¿Qué puntuación le das al sabor?</p>
                        <div class="stars" id="star-box">
                            <span onclick="setRating(1)" data-val="1">★</span>
                            <span onclick="setRating(2)" data-val="2">★</span>
                            <span onclick="setRating(3)" data-val="3">★</span>
                            <span onclick="setRating(4)" data-val="4">★</span>
                            <span onclick="setRating(5)" data-val="5">★</span>
                        </div>
                        <div id="rating-label">Toca una estrella</div>
                    </div>

                    <button id="btn-votar" onclick="enviarVoto()" class="btn-shine gold" disabled>
                        <span>ENVIAR MI CALIFICACIÓN</span>
                    </button>
                </div>
            </section>

            <footer class="legal-footer">
                <p>Desarrollado para Burguer Fest Local</p>
                <div class="social-links">● ● ●</div>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
