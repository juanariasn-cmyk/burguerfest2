<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Burguer Fest 2026 - Jurado Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <audio id="click-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <div class="main-wrapper">
        <div class="glow-spot"></div>
        
        <div class="container">
            <div class="progress-container">
                <div class="progress-bar" id="myBar"></div>
            </div>

            <header class="hero-header">
                <div class="logo-container">
                    <img src="Logo.png" alt="Burguer Fest" class="main-logo-img" onerror="this.src='https://via.placeholder.com/150?text=Burguer+Fest'">
                </div>
                <div id="champion-badge" class="champion-badge" style="display: none;">
                    <span class="crown">👑</span>
                    <span class="badge-text">ACTUAL CAMPEÓN</span>
                </div>
                <div class="status-bar">
                    <span class="live-dot"></span> JURADO EN VIVO
                </div>
            </header>

            <section class="glass-card" id="main-card">
                <div class="rest-context">
                    <img id="rest-logo" src="" alt="Restaurante" class="mini-avatar" onerror="this.src='Logo.png'">
                    <div class="name-box">
                        <span class="voter-label">ESTÁS CALIFICANDO A:</span>
                        <h2 id="rest-name">Cargando...</h2>
                    </div>
                </div>

                <div id="login-section">
                    <div class="welcome-text">
                        <h3>¡Hola, Foodie!</h3>
                        <p>Ingresa los datos de tu ticket para continuar.</p>
                    </div>

                    <div class="input-wrapper">
                        <div class="input-field">
                            <input type="tel" id="phone" required placeholder=" " oninput="updateProgress(25)">
                            <label>Celular / WhatsApp</label>
                            <span class="focus-border"></span>
                        </div>
                        <div class="input-field">
                            <input type="text" id="code" required maxlength="6" placeholder=" " oninput="this.value = this.value.toUpperCase(); updateProgress(50)">
                            <label>Código de 6 dígitos</label>
                            <span class="focus-border"></span>
                        </div>
                    </div>

                    <button onclick="validarIngreso()" class="btn-shine">
                        <span>SIGUIENTE PASO</span>
                    </button>
                </div>

                <div id="vote-section" style="display: none;">
                    <div class="image-frame">
                        <img id="burger-img" src="" alt="Hamburguesa" class="hero-burger">
                        <div class="img-overlay"></div>
                    </div>

                    <div class="rating-engine">
                        <p class="rating-hint">¿Qué tal estuvo el sabor?</p>
                        <div class="stars" id="star-box">
                            <span onclick="setRating(1)">★</span>
                            <span onclick="setRating(2)">★</span>
                            <span onclick="setRating(3)">★</span>
                            <span onclick="setRating(4)">★</span>
                            <span onclick="setRating(5)">★</span>
                        </div>
                        <div id="rating-label">Toca una estrella</div>
                    </div>

                    <button id="btn-votar" onclick="enviarVoto()" class="btn-shine gold" disabled>
                        <span>FINALIZAR Y COMPARTIR</span>
                    </button>
                </div>
            </section>

            <footer class="legal-footer">
                <p>Verificado por Burguer Fest Local © 2026</p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
