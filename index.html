<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burguer Fest 2026 - Votación Oficial</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        <header class="main-header">
            <img src="Logo.png" alt="Burguer Fest Local" class="fest-logo">
            <div class="divider"></div>
            <div class="rest-badge">
                <img id="rest-logo" src="" alt="Logo" class="logo-min">
                <h2 id="rest-name">Cargando...</h2>
            </div>
        </header>

        <hr class="separator">

        <div id="login-section" class="card">
            <h3>🔑 Ingresa tus datos</h3>
            <p class="subtitle">Escribe tu celular y el código impreso en tu recibo para validar tu voto.</p>
            <div class="input-group">
                <label>Número de Celular</label>
                <input type="tel" id="phone" placeholder="Ej: 3001234567" maxlength="10">
            </div>
            <div class="input-group">
                <label>Código Único (6 caracteres)</label>
                <input type="text" id="code" placeholder="Ingresa tu código" maxlength="6">
            </div>
            <button onclick="validarIngreso()" class="btn-main">CONTINUAR</button>
        </div>

        <div id="vote-section" class="card" style="display: none;">
            <h3>🍔 Califica la Burger</h3>
            <p class="subtitle">¿Qué te pareció la hamburguesa de este restaurante?</p>
            
            <div class="burger-wrapper">
                <img id="burger-img" src="" alt="Hamburguesa" class="burger-photo">
            </div>
            
            <div class="stars">
                <span onclick="setRating(1)">☆</span>
                <span onclick="setRating(2)">☆</span>
                <span onclick="setRating(3)">☆</span>
                <span onclick="setRating(4)">☆</span>
                <span onclick="setRating(5)">☆</span>
            </div>
            <p id="rating-text">Selecciona una calificación</p>
            
            <button id="btn-votar" onclick="enviarVoto()" class="btn-main" disabled>ENVIAR MI VOTO</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
